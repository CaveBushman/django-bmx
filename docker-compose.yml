services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    env_file:
      - ./bmx/.env
    environment:
      DJANGO_COLLECTSTATIC: "1"
      DJANGO_MIGRATE: "0"
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - ./staticfiles:/app/staticfiles
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
