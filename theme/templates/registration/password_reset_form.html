{% extends 'base.html' %}

{% block title %}Reset hesla{% endblock title %}

{% block content %}
<div class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <h2 class="text-center text-3xl font-extrabold text-gray-900">Obnova hesla</h2>
        <p class="mt-3 text-center text-sm text-gray-600">
            Zadej svůj e-mail a pošleme ti odkaz pro nastavení nového hesla.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray-700">E-mail</label>
                    <div class="mt-1">
                        <input
                            id="{{ form.email.id_for_label }}"
                            name="{{ form.email.html_name }}"
                            type="email"
                            required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                            value="{{ form.email.value|default:'' }}"
                        >
                    </div>
                    {% if form.email.errors %}
                    <p class="mt-2 text-sm text-red-600">{{ form.email.errors|join:", " }}</p>
                    {% endif %}
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                        Poslat odkaz pro reset
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
