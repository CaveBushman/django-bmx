{% extends 'base.html' %}
{% load i18n %}

{% block title %}Heslo změněno{% endblock title %}

{% block content %}
<div class="min-h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-2xl text-center">
        <h2 class="text-3xl font-extrabold text-gray-900">{% trans "Heslo bylo změněno" %}</h2>
        <p class="mt-4 text-sm text-gray-600">
            Teď se můžeš přihlásit novým heslem.
        </p>
        <a href="{% url 'accounts:login' %}" class="mt-6 inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
            Přejít na přihlášení
        </a>
    </div>
</div>
{% endblock content %}
