{% load i18n %}
<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 | Czech BMX</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --panel: rgba(255, 255, 255, 0.94);
      --text: #0f172a;
      --muted: #475569;
      --accent: #dc2626;
      --accent-strong: #b91c1c;
      --border: rgba(148, 163, 184, 0.28);
      --shadow: 0 30px 80px rgba(15, 23, 42, 0.14);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.92);
        --text: #e2e8f0;
        --muted: #cbd5e1;
        --accent: #f87171;
        --accent-strong: #ef4444;
        --border: rgba(71, 85, 105, 0.55);
        --shadow: 0 30px 80px rgba(2, 6, 23, 0.5);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(239, 68, 68, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(248, 113, 113, 0.12), transparent 24%),
        var(--bg);
    }

    main {
      width: min(100%, 760px);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .code {
      margin: 0;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
    }

    h1 {
      margin: 16px 0 0;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 16px auto 0;
      max-width: 42rem;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }
  </style>
</head>
<body>
  <main>
    <p class="code">500</p>
    <h1>{% trans "Na serveru došlo k chybě" %}</h1>
    <p>{% trans "Požadavek se nepodařilo dokončit kvůli interní chybě aplikace. Zkuste stránku načíst znovu za chvíli. Pokud problém přetrvá, je potřeba zkontrolovat logy aplikace." %}</p>
    <div class="actions">
      <a href="/">{% trans "Zpět na úvodní stránku" %}</a>
    </div>
  </main>
</body>
</html>
