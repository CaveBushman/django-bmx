{% extends 'base.html' %}
{% load static %}

{% block title %}Kontrola kreditu{% endblock title %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/dashboard-panels.css' %}">
{% endblock %}

{% block content %}
<section class="dashboard-surface min-h-screen pb-24">
  <div class="mx-auto max-w-4xl px-4 pt-10 sm:px-6 lg:px-8">
    <div class="dashboard-hero overflow-hidden rounded-[2rem] px-6 py-8 sm:px-8 sm:py-10">
      <p class="text-sm font-semibold uppercase tracking-[0.24em] text-emerald-600 dark:text-emerald-300">
        Finance
      </p>
      <div class="mt-4">
        <h1 class="text-4xl font-black tracking-tight text-slate-900 dark:text-white sm:text-5xl">
          {{ title }}
        </h1>
        <div class="mt-8 rounded-[1.5rem] border px-6 py-6 {% if status == 'error' %}border-rose-200 bg-rose-50/80 dark:border-rose-500/30 dark:bg-rose-950/30{% else %}border-emerald-200 bg-emerald-50/80 dark:border-emerald-500/30 dark:bg-emerald-950/30{% endif %}">
          <p class="text-lg font-semibold {% if status == 'error' %}text-rose-800 dark:text-rose-200{% else %}text-emerald-800 dark:text-emerald-200{% endif %}">
            {{ message }}
          </p>
          <p class="mt-3 text-sm text-slate-600 dark:text-slate-300">
            {{ detail }}
          </p>
        </div>
        <div class="mt-8 flex flex-wrap gap-3">
          <a href="{% url 'finance:finance' %}" class="inline-flex items-center rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5 hover:bg-slate-800 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-100">
            Zpět na finance
          </a>
          <a href="{% url 'event:recalculate_balances_view' %}" class="inline-flex items-center rounded-2xl border border-slate-300 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:-translate-y-0.5 hover:bg-slate-100 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-800">
            Spustit znovu
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock content %}
